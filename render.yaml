services:
  # 1. Python Backend Web Service
  - type: web
    name: neurosentinel-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO

  # 2. Next.js Frontend Web Service
  - type: web
    name: neurosentinel-dashboard
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://neurosentinel-api.onrender.com # UPDATE THIS with your actual backend URL after first deploy
